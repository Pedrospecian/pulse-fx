version: "3.9"

services:
  # ---------------------------------------------------------------
  # Banco de dados
  # ---------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend-net

  # ---------------------------------------------------------------
  # Mensageria (RabbitMQ)
  # ---------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-app}
    ports:
      - "5672:5672"   # protocolo AMQP (usado pelos serviços)
      - "15672:15672" # painel web de administração
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-net

  # ---------------------------------------------------------------
  # Microsserviço: users
  # ---------------------------------------------------------------
  service-users:
    build:
      context: ./backend/services/users
    container_name: service-users
    restart: unless-stopped
    environment:
      PORT: 4001
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-appdb}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-app}:${RABBITMQ_PASS:-app}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend-net
    # não expor porta pública: só o gateway fala com este serviço

  # ---------------------------------------------------------------
  # API Gateway - único ponto de entrada HTTP para o frontend
  # ---------------------------------------------------------------
  gateway:
    build:
      context: ./backend/gateway
    container_name: gateway
    restart: unless-stopped
    environment:
      PORT: 4000
      USERS_SERVICE_URL: http://service-users:4001
    ports:
      - "4000:4000"
    depends_on:
      - service-users
    networks:
      - backend-net
      - frontend-net

  # ---------------------------------------------------------------
  # Frontend (React + TypeScript via Vite)
  # ---------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - gateway
    networks:
      - frontend-net

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge

volumes:
  pgdata:
