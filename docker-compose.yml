version: "3.9"

services:
  # ---------------------------------------------------------------
  # Banco de dados
  # ---------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pulsefx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulsefx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsefx}
      POSTGRES_DB: ${POSTGRES_DB:-pulsefx}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # IMPORTANTE: sempre informar -d (o banco), senão o pg_isready tenta
      # conectar num banco com o mesmo nome do usuário e loga um FATAL
      # (foi exatamente o erro reportado: "database app does not exist").
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulsefx} -d ${POSTGRES_DB:-pulsefx}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------
  # Mensageria: sync -> publica "indicator.updated" -> api-public consome
  # ---------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pulsefx-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-pulsefx}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-pulsefx}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------
  # Migrations do Prisma - roda uma vez e sai (init container)
  # ---------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    container_name: pulsefx-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulsefx}:${POSTGRES_PASSWORD:-pulsefx}@postgres:5432/${POSTGRES_DB:-pulsefx}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------------
  # api-public: dashboard, detalhe, favoritos (leitura)
  # ---------------------------------------------------------------
  api-public:
    build:
      context: .
      dockerfile: apps/api-public/Dockerfile
    container_name: pulsefx-api-public
    restart: unless-stopped
    environment:
      PORT: ${API_PUBLIC_PORT:-4001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulsefx}:${POSTGRES_PASSWORD:-pulsefx}@postgres:5432/${POSTGRES_DB:-pulsefx}?schema=public
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ---------------------------------------------------------------
  # api-sync: cron de sincronização BCB/FRED + rota admin protegida
  # ---------------------------------------------------------------
  api-sync:
    build:
      context: .
      dockerfile: apps/api-sync/Dockerfile
    container_name: pulsefx-api-sync
    restart: unless-stopped
    environment:
      PORT: ${API_SYNC_PORT:-4002}
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulsefx}:${POSTGRES_PASSWORD:-pulsefx}@postgres:5432/${POSTGRES_DB:-pulsefx}?schema=public
      RABBITMQ_URL: ${RABBITMQ_URL}
      FRED_API_KEY: ${FRED_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-troque-por-um-segredo-forte}
      SYNC_TTL_MINUTES: ${SYNC_TTL_MINUTES:-60}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ---------------------------------------------------------------
  # Gateway: /api/* -> api-public | /admin/* -> api-sync
  # ---------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: pulsefx-gateway
    restart: unless-stopped
    environment:
      PORT: ${GATEWAY_PORT:-4000}
      API_PUBLIC_URL: http://api-public:${API_PUBLIC_PORT:-4001}
      API_SYNC_URL: http://api-sync:${API_SYNC_PORT:-4002}
    ports:
      - "${GATEWAY_PORT:-4000}:${GATEWAY_PORT:-4000}"
    depends_on:
      - api-public
      - api-sync

  # ---------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: pulsefx-web
    restart: unless-stopped
    ports:
      # 5173 nos dois lados: assim o build de produção (Nginx) e o dev stage
      # (Vite dev server, ver docker-compose.override.yml) usam a mesma porta
      # interna, e o Compose não tenta mapear duas coisas diferentes pra
      # mesma porta do host quando mescla os dois arquivos de config.
      - "5173:5173"
    depends_on:
      - gateway

volumes:
  pgdata:
